version: '3.8'

services:
  # Prometheus Pushgateway for receiving metrics
  pushgateway:
    image: prom/pushgateway:latest
    container_name: starlink_pushgateway
    ports:
      - "9091:9091"
    command:
      - '--persistence.file=/pushgateway/metrics'
    volumes:
      - pushgateway_data:/pushgateway
    networks:
      - starlink_network
    restart: unless-stopped

  # Prometheus server
  prometheus:
    image: prom/prometheus:latest
    container_name: starlink_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - starlink_network
    depends_on:
      - pushgateway
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: starlink_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - starlink_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Starlink Exporter - Web Mode (optional)
  exporter_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starlink_exporter_web
    ports:
      - "9817:9817"
    environment:
      - MODE=web
      - SOURCE=dummy
      - LISTEN=:9817
    networks:
      - starlink_network
    restart: unless-stopped
    # Uncomment for live mode (requires network access to 192.168.100.1:9200)
    # network_mode: host
    # command: -mode=web -source=live -listen=:9817

  # Starlink Exporter - Pushgateway Mode (optional)
  exporter_pushgateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starlink_exporter_pushgateway
    environment:
      - MODE=pushgateway
      - SOURCE=dummy
      - PUSHGATEWAY=http://pushgateway:9091
      - JOB=starlink_exporter
      - INSTANCE=starlink_docker
      - INTERVAL=15s
    networks:
      - starlink_network
    depends_on:
      - pushgateway
    restart: unless-stopped
    # Uncomment for live mode (requires network access to 192.168.100.1:9200)
    # network_mode: host
    # command: -mode=pushgateway -source=live -pushgateway=http://pushgateway:9091 -job=starlink_exporter -instance=starlink_docker -interval=15s

volumes:
  prometheus_data:
  grafana_data:
  pushgateway_data:

networks:
  starlink_network:
    driver: bridge
