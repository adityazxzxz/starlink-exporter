global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'starlink_monitor'

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Pushgateway
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']

  # Scrape Starlink Exporter Web Mode (if running)
  - job_name: 'starlink_web'
    static_configs:
      - targets: ['exporter_web:9817']
    scrape_interval: 10s
    metrics_path: '/metrics'
    honor_labels: true

# Alerting rules (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # Uncomment to use alert rules
  # - '/etc/prometheus/alert_rules.yml'
